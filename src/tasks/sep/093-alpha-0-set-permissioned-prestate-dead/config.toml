# karst-u19-alpha-0 stays PERMISSIONED under U19. This task only normalizes the permissioned
# (PERMISSIONED_CANNON, game type 1) prestate to the 0xdead placeholder, matching the betanet
# permissioned chain (beta-0) and the U19 clarification:
#   - permissioned chain: respectedGameType stays 1 (NOT changed here), game type 8 MUST NOT be
#     wired (left untouched at 0x0), op-program game type 0 stays 0x0.
#   - the permissioned game prestate may be the 0xdead placeholder (op-program deprecated).
#
# On-chain state before this task (Sepolia):
#   gameImpls(0) = 0x0                                   -> stays 0x0 (passthrough)
#   gameImpls(1) = 0xe1dF...b87e, prestate 0x0385...     -> prestate rewritten to 0xdead
#   gameImpls(8) = 0x0                                   -> stays 0x0 (no kona; NOT configured)
#   respectedGameType = 1                                -> unchanged (no SetRespectedGameType task)

