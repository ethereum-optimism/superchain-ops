#   - challenger:        0x55744b685bd143385d118fc1f413d2b93758602c
#   - chainId:           420120110 (= 0x1908004E)
#   - prestate, vm, ASR, delayedWeth, bond from migrations-sop-1 deploy artifacts
pdgGameArgs = "<TBD_PDG_GAME_ARGS>"

