# ROLLBACK — Ink mainnet migration (OP Enterprise → Gelato) — reverts cutover step 4.
#
# Restores the ORIGINAL Gelato proposer on the Ink mainnet PermissionedDisputeGame
# (PDG, game type 1), chainId 57073. Reverse of eth/061-ink-proposer-rotation.
#
# Contingency task: use ONLY if the Gelato → OPE migration must be aborted/rolled back.
# Signed by the L1 ProxyAdminOwner (mainnet) — unchanged OP governance, same signer as the
# forward task 061. Independent of the SystemConfig owner reverts (062/063).
#
# SetDisputeGameArgs reads the live gameArgs(1) and overrides ONLY the proposer; challenger
# (0x9BA6e03D…006b3A, OP governance), prestate, vm, ASR, delayedWETH, chainId and impl are
# read live and preserved. RE-SIMULATE immediately before signing.
#
# The restore proposer below is the pre-migration Gelato proposer, read live on-chain
# 2026-07-09. Re-confirm against the execution log at rollback time.

templateName = "SetDisputeGameArgs"

l2chains = [
    {name = "Ink", chainId = 57073}
]

[[gameConfig]]
chainId  = 57073
gameType = 1                                                  # PERMISSIONED_CANNON
proposer = "0x65436DDcBc026F34118954f229F7f132b696B3b4"       # pre-migration Gelato proposer — the value to restore (live gameArgs(1) 2026-07-09)
bond     = 80000000000000000                                  # 0.08 ETH — live initBonds(1) (no-op assertion; a value of 0 would RESET the bond)

[addresses]
ProxyAdminOwner         = "0x5a0Aae59D09fccBdDb6C6CcEB07B7279367C3d2A" # L1PAO mainnet (nested 2-of-2: Foundation Upgrade Safe + Security Council)
DisputeGameFactoryProxy = "0x10d7B35078d3baabB96Dd45a9143B94be65b12CD"

[stateOverrides]
# NO signer-safe nonce overrides — break-glass task; the L1PAO / FUS / SC nonces are read
# LIVE at simulation/sign time (StateOverrideManager._getNonceOrOverride → IGnosisSafe.nonce()).
# They cannot be sequenced ahead of time because the rollback may fire at any migration stage.
# Re-simulate at activation to bind the current nonces and hashes.
#
# Model the POST-MIGRATION gameArgs(1) so this revert shows a genuine OPE → Gelato proposer
# diff during standalone simulation (the live pre-migration proposer is already the Gelato
# one). These two packed slots hold the proposer at the chainId/proposer boundary; the values
# below are forward task 061's resulting (OPE) state. REMOVE at actual rollback time — the
# real post-migration gameArgs will be live on-chain.
0x10d7B35078d3baabB96Dd45a9143B94be65b12CD = [
    {key = "0x9afb513dc3306e3bc370fea0bac86eaae93221c831ccaae670c9d4101fb0fa7f", value = "0x0000000000000000000000000000000000000000000000000000def13832bfbe"},
    {key = "0x9afb513dc3306e3bc370fea0bac86eaae93221c831ccaae670c9d4101fb0fa80", value = "0xf03173e4c49a00ec0dd178817a02d1779ba6e03d8b90de867373db8cf1a58d2f"}
]
